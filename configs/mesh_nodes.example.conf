mesh.node.nl.country_name = Netherlands
mesh.node.nl.status = checking
mesh.node.nl.observation_count = 0

mesh.node.unknown.endpoint = ${CHIMERA_NODE_UNKNOWN_ENDPOINT}
mesh.node.unknown.country_code = ZZ
mesh.node.unknown.status = checking
mesh.node.unknown.observation_count = 0
