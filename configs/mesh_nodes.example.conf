# CHIMERA mesh node inventory example.
# Runtime endpoints are placeholders; replace them with env-expanded or generated config values.

mesh.nodes.ids = de,nl,unknown
mesh.nodes.current = none
mesh.nodes.pinned = none
mesh.nodes.autoconnect = true

mesh.node.de.endpoint = ${CHIMERA_NODE_DE_ENDPOINT}
