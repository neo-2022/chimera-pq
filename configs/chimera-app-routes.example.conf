# CHIMERA app/service selective routing example
# Format:
#   app:<id>=<command>
#   app-env:<id>=KEY=VALUE;KEY2=VALUE2
#   service:<id>=<systemd-user-service-name>
#   service-env:<id>=KEY=VALUE;KEY2=VALUE2
#
# Use with:
#   scripts/chimera-control.sh app-routes-status
#   scripts/chimera-control.sh route-status
#   scripts/chimera-control.sh run-app <id> [args...]
#   scripts/chimera-control.sh service-proxy-enable [service...]
#   scripts/chimera-control.sh service-proxy-disable [service...]

app:telegram=telegram-desktop
app:steam=steam
app:curl_example=curl -I https://example.org

service:example=example.service
service-env:example=NO_PROXY=localhost,127.0.0.1
